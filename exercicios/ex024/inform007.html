<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadrasto.php" method="post" autocomplete="on">
        <p>
            <label for="ieste">Estado</label>
            <select name="Estado" id="iest">

                <option value="" selected>---Escolha ---</option>
                <optgroup label="Região Sudeste">
                    <option value="RJ">RIO DE JANEIRO</option>
                    <option value="SP">SÃO PAULO</option>
                    <option value="MG">MINAS GERAIS</option>
                </optgroup>

                <optgroup  label="Região Nordeste">
                    <option value="RN">RIO GRANDE DO NORTE</option>
                    <option value="PE">PERNAMBUCO</option>
                    <option value="BA">BAHIA</option>
                </optgroup>
            </select>
        </p>

        <p>
            <label for="iprof">Profissão: </label>
            <input type="text" name="prof" id="iprof" list="lstprof">
            <datalist id="lstprof">
                <option>Administrador</option>
                <option>Contabilista</option>
                <option>Desenvolvedor</option>
                <option>Profissão</option>
                <option>Cozinheiro</option>
            </datalist>
        </p> 

           <p><label for="imsg">Mensagem: </label> <br>
            <textarea name="msg" id="imsg" cols="30" rows="10"></textarea>
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
     </p>   
    </form>
</body>
</html>
